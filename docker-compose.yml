services:

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: enterprise_catalog
      POSTGRES_USER: catalog_user
      POSTGRES_PASSWORD: catalog_pass
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog_user -d enterprise_catalog"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ktor-server
      dockerfile: Dockerfile
    restart: always
    ports:
      - "0.0.0.0:8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/enterprise_catalog
      DB_USER: catalog_user
      DB_PASSWORD: catalog_pass
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg_data:
